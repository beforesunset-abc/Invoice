<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비포썬셋 견적서</title>
    <style>
        @page { size: A4 landscape; margin: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #fdf7f2; color: #333; }
        
        .paper { width: 297mm; height: 210mm; padding: 12mm; box-sizing: border-box; background-color: #fdf7f2; }
        
        /* 헤더 섹션 */
        header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #d35400; padding-bottom: 10px; margin-bottom: 15px; }
        .logo { color: #d35400; font-size: 26px; font-weight: bold; line-height: 1.1; }
        .main-title { font-size: 38px; font-weight: bold; letter-spacing: 20px; text-decoration: underline; }
        .comp-info { text-align: right; font-size: 11px; line-height: 1.5; }

        /* 상단 기본정보 */
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #fff; }
        .info-table td { border: 2px solid #5d4037; padding: 6px 10px; font-size: 13px; }
        .label { background-color: #fbe9e7; font-weight: bold; width: 90px; text-align: center; }

        /* 메인 컨텐츠 2단 배치 */
        .content-container { display: flex; gap: 20px; }
        .left-side { flex: 1.2; }
        .right-side { flex: 1; }

        h3 { background-color: #d35400; color: #fff; text-align: center; padding: 6px; margin: 0 0 10px 0; font-size: 16px; }

        /* 테이블 공통 스타일 */
        table.content-table { width: 100%; border-collapse: collapse; background: #fff; }
        table.content-table th, table.content-table td { border: 2px solid #5d4037; padding: 8px; font-size: 13px; vertical-align: top; }
        .bg-label { background-color: #fbe9e7; font-weight: bold; text-align: center; }

        /* 폼 입력 스타일 */
        input, textarea { width: 100%; border: none; font-family: inherit; font-size: inherit; background: transparent; outline: none; }
        textarea { resize: none; min-height: 60px; }

        /* 하단 텍스트 영역 */
        .note-section { margin-top: 15px; padding: 10px; border: 2px solid #5d4037; background: #fff; }
        .note-title { font-weight: bold; color: #d35400; font-size: 13px; margin-bottom: 5px; display: block; }
        .note-text { font-size: 12px; line-height: 1.6; }

        /* 관리 도구 */
        .no-print { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; background: #d35400; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #666; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="paper">
    <header>
        <div class="logo">BEFORE<br>SUNSET</div>
        <div class="main-title">견 적 서</div>
        <div class="comp-info">비포썬셋 투어<br>카카오톡: 비포썬셋<br>현지 연락처: 010-XXXX-XXXX</div>
    </header>

    <table class="info-table">
        <tr>
            <td class="label">요청일자</td><td><input type="text" value="2026. 04. 25"></td>
            <td class="label">예약지점</td><td><input type="text" value="비포썬셋 4호점 기준"></td>
        </tr>
        <tr>
            <td class="label">예약자명</td><td><input type="text" placeholder="성함 및 인원 입력"></td>
            <td class="label">입실일자</td><td><input type="text" placeholder="YY. MM. DD"></td>
        </tr>
        <tr>
            <td class="label">총 금액</td><td style="font-weight:bold; color:#d35400;"><input type="text" placeholder="₩ 0,000,000"></td>
            <td class="label">퇴실일자</td><td><input type="text" placeholder="YY. MM. DD"></td>
        </tr>
    </table>

    <div class="content-container">
        <div class="left-side">
            <h3>주 요 일 정</h3>
            <table class="content-table" id="scheduleTable">
                <tr>
                    <td class="bg-label" width="50">1일차</td>
                    <td><textarea placeholder="일정을 입력하세요"></textarea></td>
                </tr>
                <tr>
                    <td class="bg-label">2일차</td>
                    <td><textarea placeholder="일정을 입력하세요"></textarea></td>
                </tr>
            </table>
            <div class="no-print" style="position:static; margin-top:5px;">
                <button class="btn btn-add" onclick="addDay()">+ 일정 추가</button>
            </div>
        </div>

        <div class="right-side">
            <h3>세 부 내 역</h3>
            <table class="content-table">
                <tr>
                    <td class="bg-label" width="90">숙박</td>
                    <td><input type="text" value="프라이빗 풀빌라"></td>
                </tr>
                <tr>
                    <td class="bg-label" rowspan="5">포함서비스</td>
                    <td><input type="text" value="골프: "></td>
                </tr>
                <tr><td><input type="text" value="차량: "></td></tr>
                <tr><td><input type="text" value="마사지: "></td></tr>
                <tr><td><input type="text" value="야간투어: "></td></tr>
                <tr><td><input type="text" value="기타서비스: "></td></tr>
                <tr>
                    <td class="bg-label">불포함서비스</td>
                    <td><input type="text" value="기타: "></td>
                </tr>
            </table>

            <div class="note-section">
                <span class="note-title">◆ 특이사항</span>
                <textarea class="note-text" placeholder="특이사항을 입력하세요..."></textarea>
            </div>

            <div class="note-section" style="margin-top:10px;">
                <span class="note-title">◆ 취소 및 환불 규정</span>
                <div class="note-text">
                    - 입실 30일 전 취소: 100% 환불<br>
                    - 입실 15일 전 취소: 50% 환불<br>
                    - 그 이후 취소 시 환불 불가 (현지 규정 준수)
                </div>
            </div>
        </div>
    </div>
</div>

<div class="no-print">
    <button class="btn" onclick="window.print()">PDF 저장 / 인쇄</button>
</div>

<script>
    function addDay() {
        const table = document.getElementById('scheduleTable');
        const count = table.rows.length + 1;
        const row = table.insertRow(-1);
        row.innerHTML = `<td class="bg-label">${count}일차</td><td><textarea></textarea></td>`;
    }
</script>

</body>
</html>
