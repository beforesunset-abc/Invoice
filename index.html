<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before Sunset - 견적서 생성기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main-color: #333; --accent-color: #555; }
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--main-color); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8f8f8; }
        input { width: 90%; border: none; text-align: center; font-size: 16px; }
        .total-section { text-align: right; font-size: 1.2em; font-weight: bold; margin-top: 20px; }
        .btn-container { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #333; color: white; }
        button:hover { background: #555; }
        @media print { .btn-container { display: none; } }
    </style>
</head>
<body>

<div class="container" id="estimate">
    <h1>견적서 (Before Sunset)</h1>
    <table>
        <thead>
            <tr>
                <th>항목</th>
                <th>수량</th>
                <th>단가</th>
                <th>금액</th>
            </tr>
        </thead>
        <tbody id="item-table">
            <tr>
                <td><input type="text" placeholder="항목 입력"></td>
                <td><input type="number" class="qty" value="0" oninput="calc()"></td>
                <td><input type="number" class="price" value="0" oninput="calc()"></td>
                <td class="row-total">0</td>
            </tr>
        </tbody>
    </table>

    <div class="total-section">
        합계 금액: <span id="grand-total">0</span>원
    </div>
</div>

<div class="btn-container">
    <button onclick="addRow()">항목 추가</button>
    <button onclick="savePDF()">PDF로 저장</button>
</div>

<script>
    function addRow() {
        const table = document.getElementById('item-table');
        const newRow = table.insertRow();
        newRow.innerHTML = `
            <td><input type="text" placeholder="항목 입력"></td>
            <td><input type="number" class="qty" value="0" oninput="calc()"></td>
            <td><input type="number" class="price" value="0" oninput="calc()"></td>
            <td class="row-total">0</td>
        `;
    }

    function calc() {
        let grandTotal = 0;
        const rows = document.querySelectorAll('#item-table tr');
        rows.forEach(row => {
            const qty = row.querySelector('.qty').value || 0;
            const price = row.querySelector('.price').value || 0;
            const total = qty * price;
            row.querySelector('.row-total').innerText = total.toLocaleString();
            grandTotal += total;
        });
        document.getElementById('grand-total').innerText = grandTotal.toLocaleString();
    }

    function savePDF() {
        const element = document.getElementById('estimate');
        const opt = {
            margin: 1,
            filename: 'Before_Sunset_견적서.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
