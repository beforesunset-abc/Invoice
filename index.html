<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비포썬셋 견적서 양식</title>
    <style>
        /* A4 가로 인쇄 설정 */
        @page { size: A4 landscape; margin: 0; }
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #fdf7f2; /* 샘플의 연한 베이지 배경색 */
        }

        .paper {
            width: 297mm;
            height: 210mm;
            padding: 15mm;
            box-sizing: border-box;
            background-color: #fdf7f2;
            position: relative;
        }

        /* 상단 로고 및 제목 영역 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            border-bottom: 3px solid #d35400; /* 오렌지색 포인트 라인 */
            padding-bottom: 10px;
        }

        .logo-area {
            color: #d35400;
            font-size: 28px;
            font-weight: bold;
            line-height: 1;
        }

        .main-title {
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 20px;
            text-decoration: underline;
            margin-left: 50px;
        }

        .company-info {
            text-align: right;
            font-size: 12px;
            line-height: 1.6;
        }

        /* 기본 정보 테이블 */
        .top-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #fff;
        }

        .top-table td {
            border: 2px solid #5d4037; /* 진한 브라운 테두리 */
            padding: 8px;
            font-size: 14px;
        }

        .label {
            background-color: #fbe9e7;
            font-weight: bold;
            width: 100px;
            text-align: center;
        }

        /* 메인 2단 구성 */
        .content-wrapper {
            display: flex;
            gap: 20px;
        }

        .schedule-section { flex: 1.5; }
        .detail-section { flex: 1; }

        h3 {
            background-color: #d35400;
            color: white;
            text-align: center;
            padding: 5px;
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        table.main-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        table.main-table th, table.main-table td {
            border: 2px solid #5d4037;
            padding: 10px;
            font-size: 13px;
        }

        table.main-table th {
            background-color: #fbe9e7;
        }

        .day-cell {
            background-color: #fbe9e7;
            font-weight: bold;
            width: 60px;
            text-align: center;
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            height: 100px;
        }

        input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
        }

        /* 모바일 대응 및 인쇄 컨트롤 */
        .no-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn {
            padding: 10px 20px;
            background: #d35400;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        @media print {
            .no-print { display: none; }
            body { background-color: #fff; }
            .paper { box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="paper">
    <header>
        <div class="logo-area">BEFORE<br>SUNSET</div>
        <div class="main-title">견 적 서</div>
        <div class="company-info">
            비포썬셋 투어<br>
            사업자번호: 123-45-67890<br>
            연락처: 010-1234-5678
        </div>
    </header>

    <table class="top-table">
        <tr>
            <td class="label">요청일자</td><td><input type="text" value="2026. 03. 30"></td>
            <td class="label">예약지점</td><td><input type="text" value="비포썬셋 4호점"></td>
        </tr>
        <tr>
            <td class="label">예약자명</td><td><input type="text" value="장세환 4인팀"></td>
            <td class="label">입실일자</td><td><input type="text" value="2026. 06. 18"></td>
        </tr>
        <tr>
            <td class="label">총 금액</td><td><input type="text" value="₩ 2,992,000"></td>
            <td class="label">퇴실일자</td><td><input type="text" value="2026. 06. 21"></td>
        </tr>
    </table>

    <div class="content-wrapper">
        <div class="schedule-section">
            <h3>주 요 일 정</h3>
            <table class="main-table" id="schTable">
                <tr>
                    <td class="day-cell">1일차</td>
                    <td><textarea>한국 출발 / 비엔티안 공항 도착&#10;풀빌라 체크인 및 휴식</textarea></td>
                </tr>
                <tr>
                    <td class="day-cell">2일차</td>
                    <td><textarea>롱비엔CC 18홀 라운딩&#10;자유시간 및 마사지 서비스</textarea></td>
                </tr>
            </table>
            <div class="no-print" style="position:static; margin-top:5px;">
                <button class="btn" style="background:#666; padding:5px 10px;" onclick="addSch()">+ 일정추가</button>
            </div>
        </div>

        <div class="detail-section">
            <h3>세 부 내 역</h3>
            <table class="main-table">
                <thead>
                    <tr><th>항목</th><th>내용</th></tr>
                </thead>
                <tbody>
                    <tr><td class="label">숙박</td><td><input type="text" value="프라이빗 풀빌라"></td></tr>
                    <tr><td class="label">포함</td><td><input type="text" value="전일정 차량/가이드"></td></tr>
                    <tr><td class="label">특전</td><td><input type="text" value="마사지 90분 제공"></td></tr>
                </tbody>
            </table>
            
            <div style="margin-top:20px;">
                <h4 style="margin-bottom:5px; color:#d35400;">◆ 특이사항</h4>
                <textarea style="border: 2px solid #5d4037; background: #fff; padding: 10px; height: 120px;">- 예약금 입금 후 확정&#10;- 환불 규정은 약관에 따름</textarea>
            </div>
        </div>
    </div>
</div>

<div class="no-print">
    <button class="btn" onclick="window.print()">PDF 저장 / 인쇄</button>
</div>

<script>
    function addSch() {
        const table = document.getElementById('schTable');
        const count = table.rows.length + 1;
        const row = table.insertRow(-1);
        row.innerHTML = `<td class="day-cell">${count}일차</td><td><textarea></textarea></td>`;
    }
</script>

</body>
</html>
